name: Build Component in Native Environment

on:
  pull_request:
    branches: [ develop ]
    paths: ['**/*.c', '**/*.cpp', '**/*.cc', '**/*.cxx', '**/*.h', '**/*.hpp', '**/*.sh']

jobs:
  build-meminsight-on-pr:
    name: Build xMemInsight component in GitHub RDKCentral
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/rdkcentral/docker-device-mgt-service-test/native-platform:1.6.9

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install Dependencies
        run: |
          apt-get update
          apt-get install -y autotools-dev autoconf automake pkg-config

      - name: Clean build artifacts
        run: |
          sh cov_build.sh --clean

      - name: Build the component
        run: |
          sh cov_build.sh

      - name: Verify build output
        run: |
          ls -la xmeminsight || echo "Build artifact not found"
          file xmeminsight || echo "Cannot check file type"
          echo "Build verification complete"

      - name: Locate built binary and expose at repo root
        run: |
          # look for an executable named xmeminsight anywhere under the repo
          BINARY=$(find . -type f -name xmeminsight -perm /111 -print -quit || true)
          if [ -z "$BINARY" ]; then
            echo "ERROR: xmeminsight binary not found after build. Listing likely locations for debugging:"
            find . -maxdepth 6 -type f -name 'xmeminsight*' -print || true
            exit 1
          fi
          echo "Found xmeminsight at: $BINARY"
          if [ "$BINARY" = "./xmeminsight" ]; then
            echo "Binary already at repo root; skipping copy"
          else
            cp "$BINARY" ./xmeminsight
            chmod +x ./xmeminsight
          fi
          ls -la ./xmeminsight

      - name: Install Dependencies (valgrind, yes)
        run: |
          apt-get update
          apt-get install -y valgrind coreutils

      - name: Ensure runner script is executable
        run: |
          chmod +x ./safe_run_xmem.sh || true
          ls -la ./safe_run_xmem.sh || echo "safe_run_xmem.sh not found"

      - name: Run Valgrind cases using safe_run_xmem.sh
        run: |
          ./safe_run_xmem.sh
