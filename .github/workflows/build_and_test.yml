name: Build and Test Component in Native Environment

permissions:
  contents: read

on:
  pull_request:
    branches: [ develop ]
    paths: ['**/*.c', '**/*.cpp', '**/*.cc', '**/*.cxx', '**/*.h', '**/*.hpp', '**/*.sh']

jobs:
  build-and-test-meminsight-on-pr:
    name: Build and Test xMemInsight component in GitHub RDKCentral
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/rdkcentral/docker-device-mgt-service-test/native-platform:1.6.9

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install Dependencies
        run: |
          apt-get update
          apt-get install -y autotools-dev autoconf automake pkg-config libcjson-dev jq

      - name: Clean build artifacts
        run: |
          sh cov_build.sh --clean

      - name: Build the component (vanilla - no optional features)
        run: |
          sh cov_build.sh

      - name: Verify vanilla build output
        run: |
          ls -la xmeminsight || echo "Vanilla build artifact not found"
          file xmeminsight || echo "Cannot check file type"
          ./xmeminsight --help || echo "Binary not executable"
          echo "Vanilla build verification complete"

      - name: Build the component with test mode
        run: |
          sh cov_build.sh --clean
          sh cov_build.sh --enable-test

      - name: Build the component with cJSON support
        run: |
          sh cov_build.sh --clean
          sh cov_build.sh --enable-cjson

      - name: Build the component with both test and cJSON
        run: |
          sh cov_build.sh --clean
          sh cov_build.sh --enable-cjson --enable-test

      - name: Verify build output
        run: |
          ls -la xmeminsight || echo "Build artifact not found"
          file xmeminsight || echo "Cannot check file type"
          echo "Build verification complete"

      - name: Run tests
        run: |
          chmod +x run_ut.sh
          ./run_ut.sh
        shell: bash
